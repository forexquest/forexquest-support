<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Support | Forex Quest Global</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { background-color: #000b18; color: white; font-family: 'Inter', sans-serif; overflow: hidden; }
        .gold-text { color: #D4AF37; }
        .gold-bg { background: linear-gradient(45deg, #D4AF37, #f2d06b); color: #000b18; }
        .cyrus-bubble { background: rgba(212, 175, 55, 0.1); border-left: 3px solid #D4AF37; border-radius: 4px 18px 18px 18px; }
        .user-bubble { background: rgba(255, 255, 255, 0.05); border-radius: 18px; border: 1px solid rgba(255,255,255,0.08); }
        .chat-img { max-width: 200px; border-radius: 8px; margin-top: 5px; cursor: pointer; }
        .modal-overlay { background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(4px); }
        .rating-card { background: white; border-radius: 24px; animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    </style>
</head>
<body class="flex flex-col h-screen">

    <nav class="p-4 border-b border-gray-800 flex justify-between items-center bg-[#000b18]">
        <div class="flex items-center gap-3">
            <button onclick="history.back()" class="w-8 h-8 flex items-center justify-center rounded-full bg-gray-900 border border-gray-700 active:scale-90 transition-transform cursor-pointer">
                <i class="fa-solid fa-chevron-left text-xs text-gray-400"></i>
            </button>
            <div>
                <h2 class="font-bold text-sm gold-text">Cyrus <span class="text-gray-400 font-normal">| Navigator</span></h2>
                <p class="text-[9px] text-green-500 uppercase font-black tracking-widest flex items-center gap-1">
                    <span class="w-1.5 h-1.5 bg-green-500 rounded-full animate-pulse"></span> Systems Active
                </p>
            </div>
        </div>
    </nav>

    <div id="chat-container" class="flex-1 overflow-y-auto p-4 space-y-6"></div>

    <div class="p-4 bg-[#000b18] border-t border-gray-900">
        <div class="flex items-center gap-2 bg-gray-900/50 p-2 rounded-2xl border border-gray-800">
            <label class="w-10 h-10 flex items-center justify-center cursor-pointer text-gray-400 hover:text-white">
                <i class="fa-solid fa-paperclip"></i>
                <input type="file" id="image-input" accept="image/*" class="hidden" onchange="uploadImage(this)">
            </label>
            <input type="text" id="user-input" placeholder="Message support..." class="flex-1 bg-transparent border-none text-sm outline-none py-2 text-gray-200">
            <button onclick="handleSend()" class="gold-bg w-10 h-10 rounded-xl flex items-center justify-center shadow-lg active:scale-95">
                <i class="fa-solid fa-paper-plane text-sm"></i>
            </button>
        </div>
    </div>

    <div id="rating-modal" class="modal-overlay fixed inset-0 z-50 flex items-center justify-center hidden p-6">
        <div class="rating-card w-full max-w-sm p-8 text-center shadow-2xl">
            <h3 class="text-gray-900 font-black text-xl mb-2">Share your feedback</h3>
            <p class="text-gray-500 text-sm mb-8">How would you rate the support you received?</p>
            <div class="space-y-3">
                <button onclick="submitRating('Very Satisfied')" class="w-full border-2 border-gray-100 p-4 rounded-2xl flex items-center gap-4 hover:bg-blue-50 transition-all active:scale-95">
                    <span class="text-2xl">🤩</span> <span class="text-gray-800 font-bold text-sm">Very satisfied</span>
                </button>
                <button onclick="submitRating('Satisfied')" class="w-full border-2 border-gray-100 p-4 rounded-2xl flex items-center gap-4 hover:bg-blue-50 transition-all active:scale-95">
                    <span class="text-2xl">😊</span> <span class="text-gray-800 font-bold text-sm">Satisfied</span>
                </button>
                <button onclick="submitRating('Unsatisfied')" class="w-full border-2 border-gray-100 p-4 rounded-2xl flex items-center gap-4 hover:bg-red-50 transition-all active:scale-95">
                    <span class="text-2xl">☹️</span> <span class="text-gray-800 font-bold text-sm">Unsatisfied</span>
                </button>
            </div>
            <button onclick="closeModal()" class="mt-8 text-gray-400 text-[10px] font-black uppercase tracking-widest hover:text-gray-600">Maybe Later</button>
        </div>
    </div>

    <script>
        // --- CONFIGURATION ---
        const firebaseConfig = {
            apiKey: "AIzaSyDYZxfER-KfThiRp9MLu869aDrjX9BDOqs",
            databaseURL: "https://forexquest-fbcac-default-rtdb.firebaseio.com/",
            projectId: "forexquest-fbcac",
        };

        const BOT_TOKEN = '8670584691:AAGk5OifLolCXzte-X-R6j7hMt14LkK4ok0';
        const ADMIN_GROUP_ID = '-1003903750289'; // Updated with your correct Supergroup ID

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        
        let userId = localStorage.getItem('cyrus_user_id') || "User_" + Math.floor(Math.random() * 9000 + 1000);
        localStorage.setItem('cyrus_user_id', userId);
        
        const chatRef = database.ref('support_chats/' + userId);
        const chatBox = document.getElementById('chat-container');
        const userInput = document.getElementById('user-input');

        // --- CYRUS AUTOMATED GREETING ---
        function sendCyrusGreeting() {
            const greeting = "Hello! 👋 Go ahead and ask your question 👍\n\nPlease include your telegram username so we can help you faster!\n\nAn agent will reply as soon as possible 🧑‍💻 thank you for your patience.";
            displayMessage(greeting, 'cyrus');
        }

        sendCyrusGreeting();
        setInterval(sendCyrusGreeting, 1800000);

        // --- TELEGRAM NOTIFICATION (Final Power Version) ---
        function notifyTelegramAdmin(msg) {
            const adminText = `🚨 *NEW SUPPORT INQUIRY*\n\n🆔 *ID:* \`${userId}\` \n📝 *Message:* "${msg}"\n\nCheck site for ID: ${userId}`;
            const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${ADMIN_GROUP_ID}&text=${encodeURIComponent(adminText)}&parse_mode=Markdown`;

            // This "beacon" method is the most reliable for mobile browser previews
            const beacon = new Image();
            beacon.src = url;
            
            // Standard fetch as primary
            fetch(url).catch(err => console.log("Silent notify active"));
        }

        function displayMessage(text, sender, isImage = false) {
            const div = document.createElement('div');
            div.className = sender === 'user' ? "flex flex-col items-end gap-2 w-full" : "flex items-start gap-3 w-full";
            let content = isImage ? `<img src="${text}" class="chat-img" onclick="window.open('${text}')">` : `<p class="text-xs">${text}</p>`;
            div.innerHTML = sender === 'user' 
                ? `<div class="user-bubble p-3 max-w-[80%] bg-[#D4AF37]/10 text-right ml-auto">${content}</div>`
                : `<div class="w-9 h-9 rounded-full gold-bg flex items-center justify-center text-xs font-black shrink-0">C</div><div class="cyrus-bubble p-4 max-w-[85%]"><p class="text-[10px] gold-text font-black uppercase mb-1">Cyrus</p>${content}</div>`;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        async function uploadImage(input) {
            if (!input.files || !input.files[0]) return;
            const file = input.files[0];
            const formData = new FormData();
            formData.append("image", file);
            const apiKey = "161f4ec439942b5690f5207ba9fdc277"; 
            displayMessage("Uploading image...", 'user');
            try {
                const response = await fetch(`https://api.imgbb.com/1/upload?key=${apiKey}`, { method: "POST", body: formData });
                const result = await response.json();
                const imageUrl = result.data.url;
                chatRef.push({ sender: 'user', text: imageUrl, type: 'image', time: Date.now() });
                notifyTelegramAdmin("[User Sent an Image]");
            } catch (error) { alert("Upload failed."); }
        }

        chatRef.on('child_added', (snap) => {
            const data = snap.val();
            if (data.type === 'close_session') {
                document.getElementById('rating-modal').classList.remove('hidden');
            } else if (data.type !== 'rating_result' && data.sender !== 'cyrus') {
                displayMessage(data.text, data.sender, data.type === 'image');
            }
        });

        function handleSend() {
            const text = userInput.value.trim();
            if (!text) return;
            chatRef.push({ sender: 'user', text: text, type: 'text', time: Date.now() });
            notifyTelegramAdmin(text);
            userInput.value = '';
        }

        function submitRating(val) {
            chatRef.push({ sender: 'user', text: `Feedback: ${val}`, type: 'rating_result', time: Date.now() });
            alert("Thank you!");
            closeModal();
        }
        function closeModal() { document.getElementById('rating-modal').classList.add('hidden'); }
        userInput.addEventListener("keypress", (e) => { if (e.key === "Enter") handleSend(); });
    </script>
</body>
</html>
